<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ページタイトル -->
    <title>新規登録 | Salon Booking System</title>

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <!-- ヘッダー -->
    <header>
        <h1>新規会員登録</h1>
        <p>必要事項を入力してください</p>
    </header>

    <!-- 新規登録フォーム -->
    <main class="container">

        <!--
            画面のみ作成
        -->
        <form action="/register" method="POST">

            <!-- 名前 -->
            <div class="form-group">
                <label for="name">氏名</label>
                <input
                    type="text"
                    id="name"
                    name="name"
                    placeholder="山田 花子"
                    required>
            </div>

            <!-- メールアドレス -->
            <div class="form-group">
                <label for="email">メールアドレス</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="sample@example.com"
                    required>
            </div>

            <!-- 電話番号 -->
            <div class="form-group">
                <label for="phone">電話番号</label>
                <input
                    type="tel"
                    id="phone"
                    name="phone"
                    placeholder="09012345678"
                    required>
            </div>

            <!-- パスワード -->
            <div class="form-group">
                <label for="password">パスワード</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="??文字以上で入力"
                    required>
            </div>

            <!-- パスワード確認 -->
            <div class="form-group">
                <label for="confirm_password">パスワード（確認）</label>
                <input
                    type="password"
                    id="confirm_password"
                    name="confirm_password"
                    placeholder="もう一度入力"
                    required>
            </div>

            <!-- 登録ボタン -->
            <button type="submit">
                新規登録
            </button>

        </form>

        <!-- ログイン画面 -->
        <button onclick="location.href='/login'">
            ログインはこちら
        </button>

        <!-- トップへ戻る -->
        <button onclick="location.href='/'">
            トップへ戻る
        </button>

    </main>

    <!-- JavaScript -->
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>

</html>
