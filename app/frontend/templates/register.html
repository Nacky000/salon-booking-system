<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ページタイトル -->
    <title>新規登録</title>

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <!-- ヘッダー -->
    <header>
        <h1>新規会員登録</h1>
        <p>必要事項を入力してください</p>
    </header>

    <!-- 新規登録フォーム -->
    <main class="container">
        <form action="/register" method="POST">

            <!-- 名前 -->
            <div class="form-group">
            <label>名前</label>
            <input
                type="text"
                name="name"
                placeholder="名前"
                required>
            </div>

            <!-- メールアドレス -->
            <div class="form-group">
            <label>メールアドレス</label>
            <input
                type="email"
                name="email"
                placeholder="example@eed.tus.ac.jp"
                required>
        </div>

            <!-- 電話番号 -->
            <div class="form-group">
                <label for="phone">電話番号</label>
                <input
                    type="tel"
                    id="phone"
                    name="phone"
                    placeholder="09012345678"
                    required>
            </div>

            <!-- パスワード -->
           <div class="form-group">
            <label>パスワード</label>
            <input
                type="password"
                name="password"
                required>
           </div>

            <!-- パスワード確認 -->
            <div class="form-group">
                <label for="confirm_password">パスワード（確認）</label>
                <input
                    type="password"
                    id="confirm_password"
                    name="confirm_password"
                    placeholder="もう一度入力"
                    required>
            </div>

            <!-- 登録ボタン -->
            <button type="submit">
                新規会員登録
            </button>

        </form>

        <!-- ログイン画面 -->
        <button onclick="location.href='/login'">
            ログイン画面へ
        </button>

    </main>

    <!-- JavaScript -->
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>

</html>
