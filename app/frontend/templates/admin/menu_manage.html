<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<title>メニュー管理</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<header>

<h1>メニュー管理</h1>

</header>

<main class="container">

{% if menus %}

{% for menu in menus %}

<div class="admin-card">

<h3>{{ menu.name }}</h3>

<p>料金：{{ menu.price }} 円</p>

<p>施術時間：{{ menu.duration }} 分</p>

<button type="button"
onclick="showEdit('{{menu.menu_id}}')">
編集
</button>

<form action="/admin/menu/delete" method="POST">

<input 
type="hidden"
name="menu_id"
value="{{ menu.menu_id }}"
>

<button type="submit">削除</button>

</form>

<!-- 編集フォーム -->

<div id="edit-{{menu.menu_id}}"
style="display:none;">

<form action="/admin/menu/update"
method="POST">

<div class="form-group">
<label>メニュー名</label>
<input type="hidden"
name="menu_id"
value="{{menu.menu_id}}">

<input
name="name"
value="{{menu.name}}">
</div>

<div class="form-group">
<label>料金</label>
<input
name="price"
value="{{menu.price}}">
</div>

<div class="form-group">
<label>時間</label>
<input
name="duration"
value="{{menu.duration}}">
</div>

<button type="submit">更新</button>

</form>

</div>

</div>

{% endfor %}

{% else %}

<p class="message">メニューがありません。</p>

{% endif %}

<button type="button"
onclick="showAdd()">
＋ メニュー追加
</button>

<div id="add-menu"
style="display:none;">

<form action="/admin/menu/add" method="POST">

<input name="name"
placeholder="メニュー名">

<input name="price"
placeholder="料金">

<input name="duration"
placeholder="時間">

<button type="submit">追加</button>

</form>

</div>

<button onclick="location.href='/admin'">戻る</button>

</main>

<script>

function showEdit(id){
    const form =
    document.getElementById(
        "edit-" + id
    );

    if(form.style.display === "none"){
        form.style.display="block";
    }
    else{
        form.style.display="none";
    }
}

function showAdd(){
    const area =
    document.getElementById(
        "add-menu"
    );

    if(area.style.display==="none"){
        area.style.display="block";
    }
    else{
        area.style.display="none";
    }
}

</script>

</body>

</html>
