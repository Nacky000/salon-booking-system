<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ページタイトル -->
    <title>ログイン | Salon Booking System</title>

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<header>
    <h1>ログイン</h1>
    <p>ログインして予約をご利用ください</p>
</header>

<main class="container">

    <form action="/login" method="POST">

        <div class="form-group">
            <label>メールアドレス</label>
            <input
                type="email"
                name="email"
                placeholder="example@email.com"
                required>
        </div>

        <div class="form-group">
            <label>パスワード</label>
            <input
                type="password"
                name="password"
                placeholder="パスワード"
                required>
        </div>

        <button type="submit">
            ログイン
        </button>

    </form>

    <hr>

    <p class="message">
        アカウントをお持ちでない方
    </p>

    <button onclick="location.href='/register'">
        新規登録
    </button>

</main>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>

</html>
