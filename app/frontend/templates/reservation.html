<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>予約画面 | Salon Booking System</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<header>
    <h1>予約画面</h1>
    <p>予約情報を入力してください</p>
</header>

<main class="container">

<form action="/reservation/create" method="POST">

    <!-- メニュー -->
    <div class="form-group">
        <label for="menu_ids">メニュー</label>

        <select id="menu_ids" name="menu_ids" multiple required>
            {% for menu in menus %}
            <option value="{{ menu.menu_id }}">
                {{ menu.name }}（{{ menu.price }}円・{{ menu.duration }}分）
            </option>
            {% endfor %}
        </select>

        <small>※Ctrl（Macは⌘）を押しながら複数選択できます。</small>
    </div>

    <!-- 美容師 -->
    <div class="form-group">
        <label for="stylist_id">担当美容師</label>

        <select id="stylist_id" name="stylist_id" required>
            {% for stylist in stylists %}
            <option value="{{ stylist.stylist_id }}">
                {{ stylist.name }}
            </option>
            {% endfor %}
        </select>
    </div>

    <!-- 日付 -->
    <div class="form-group">
        <label for="date">予約日</label>

        <input
            type="date"
            id="date"
            name="date"
            required>
    </div>

    <!-- 時間 -->
    <div class="form-group">

        <label>予約時間</label>

        <div id="time-area">
            メニュー・美容師・日付を選択してください
        </div>

    </div>

    <input type="hidden" id="time" name="time">

    <button type="submit">
        予約する
    </button>

</form>

<button onclick="location.href='/'">
    トップへ戻る
</button>

</main>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>

</html>
