<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ページタイトル -->
    <title>予約履歴 | Salon Booking System</title>

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <!-- ========================= -->
    <!-- ヘッダー -->
    <!-- ========================= -->
    <header>
        <h1>予約履歴</h1>
        <p>これまでの予約履歴を確認できます</p>
    </header>

    <!-- ========================= -->
    <!-- 予約履歴 -->
    <!-- ========================= -->
    <main class="container">

    {% if histories %}

        {% for history in histories %}

        <div class="reservation-card">

            <h3>予約履歴</h3>

            <p><strong>メニュー：</strong>{{ ", ".join(history.menu_names) }}</p>
            <p><strong>美容師：</strong>{{ history.stylist_name }}</p>
            <p><strong>利用日：</strong>{{ history.date }}</p>
            <p><strong>利用時間：</strong>{{ history.time }}</p>
            <p><strong>ステータス：</strong>{{ history.status_text }}</p>

        </div>

        {% endfor %}

    {% else %}

        <p>予約履歴はありません。</p>

    {% endif %}

        <!-- トップページへ戻る -->
        <button onclick="location.href='/'">
            トップへ戻る
        </button>

    </main>

    <!-- JavaScript -->
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>

</html>
